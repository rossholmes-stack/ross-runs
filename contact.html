<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Ross Runs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <header class="contact-header">
    <nav class="nav">
      <a href="index.html" class="logo">ROSS RUNS</a>
      <ul>
        <li><a href="index.html#stats">Stats</a></li>
        <li><a href="index.html#routes">Routes</a></li>
        <li><a href="index.html#log">Log</a></li>
        <li><a href="index.html#gear">Gear</a></li>
        <li><a href="training.html">Training</a></li>
        <li><a href="weather.html">Weather</a></li>
        <li><a href="contact.html" class="nav-active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- CONTACT -->
  <main class="contact-main">
    <div class="contact-inner">
      <div class="contact-intro">
        <p class="hero-label">Get In Touch</p>
        <h2>Say Hello</h2>
        <p class="contact-sub">Got a question, want to share a route, or just want to talk running? Drop me a message.</p>
      </div>

      <form class="contact-form" action="mailto:test@ross.com?subject=Message from Ross Runs" method="post" enctype="text/plain">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="What's it about?">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="logo">ROSS RUNS</span>
    <p>Built with sweat, Git, and VS Code.</p>
  </footer>

</body>
</html>
